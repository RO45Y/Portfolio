<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit Yadav | AI/ML Engineer & Backend Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#8B5CF6',
                        dark: '#0F172A',
                        darker: '#020617',
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'gradient': 'gradient 8s linear infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        gradient: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F172A;
            color: #F8FAFC;
            overflow-x: hidden;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-strong {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .text-gradient {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 50%, #EC4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .bg-gradient-radial {
            background: radial-gradient(circle at center, var(--tw-gradient-from), var(--tw-gradient-to));
        }
        
        .skill-bar {
            transition: width 1.5s ease-out;
        }
        
        .project-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .project-card:hover {
            transform: translateY(-10px) scale(1.02);
        }
        
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid #3B82F6;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.2s, opacity 0.2s;
            mix-blend-mode: difference;
        }
        
        .cursor-dot {
            width: 4px;
            height: 4px;
            background: #3B82F6;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
        }
        
        .typing-cursor::after {
            content: '|';
            animation: blink 1s infinite;
            color: #3B82F6;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.5;
            animation: float 20s infinite;
        }
        
        .timeline-line {
            background: linear-gradient(to bottom, #3B82F6, #8B5CF6, transparent);
        }
        
        .nav-link {
            position: relative;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background: linear-gradient(90deg, #3B82F6, #8B5CF6);
            transition: width 0.3s;
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        .btn-glow:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }
        
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Fix for image loading */
        .profile-img-container {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        
        /* Ensure social icons are visible */
        .social-icon-fix svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, useScroll, useTransform, useSpring, useInView } = window.Motion;
        
        // Custom Cursor Component
        const CustomCursor = () => {
            const [position, setPosition] = useState({ x: 0, y: 0 });
            const [isHovering, setIsHovering] = useState(false);
            
            useEffect(() => {
                const handleMouseMove = (e) => {
                    setPosition({ x: e.clientX, y: e.clientY });
                };
                
                const handleMouseOver = (e) => {
                    if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.hoverable')) {
                        setIsHovering(true);
                    } else {
                        setIsHovering(false);
                    }
                };
                
                window.addEventListener('mousemove', handleMouseMove);
                window.addEventListener('mouseover', handleMouseOver);
                
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseover', handleMouseOver);
                };
            }, []);
            
            return (
                <>
                    <div 
                        className="custom-cursor hidden md:block"
                        style={{ 
                            left: position.x - 10, 
                            top: position.y - 10,
                            transform: isHovering ? 'scale(2)' : 'scale(1)',
                            opacity: isHovering ? 0.5 : 1
                        }}
                    />
                    <div 
                        className="cursor-dot hidden md:block"
                        style={{ left: position.x - 2, top: position.y - 2 }}
                    />
                </>
            );
        };

        // Particle Background
        const ParticleBackground = () => {
            const particles = Array.from({ length: 50 }, (_, i) => ({
                id: i,
                x: Math.random() * 100,
                y: Math.random() * 100,
                size: Math.random() * 4 + 1,
                duration: Math.random() * 20 + 10,
                delay: Math.random() * 5
            }));
            
            return (
                <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
                    {particles.map((p) => (
                        <div
                            key={p.id}
                            className="particle bg-blue-500/20"
                            style={{
                                left: `${p.x}%`,
                                top: `${p.y}%`,
                                width: p.size,
                                height: p.size,
                                animationDuration: `${p.duration}s`,
                                animationDelay: `${p.delay}s`
                            }}
                        />
                    ))}
                </div>
            );
        };

        // Navigation
        const Navigation = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            
            useEffect(() => {
                const handleScroll = () => setIsScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            
            const navLinks = [
                { name: 'Home', href: '#home' },
                { name: 'About', href: '#about' },
                { name: 'Skills', href: '#skills' },
                { name: 'Projects', href: '#projects' },
                { name: 'Experience', href: '#experience' },
                { name: 'Contact', href: '#contact' }
            ];
            
            return (
                <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${isScrolled ? 'glass-strong py-4' : 'py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <motion.a 
                            href="#home" 
                            className="text-2xl font-bold text-gradient"
                            initial={{ opacity: 0, x: -20 }}
                            animate={{ opacity: 1, x: 0 }}
                            transition={{ duration: 0.5 }}
                        >
                            &lt;Rohit /&gt;
                        </motion.a>
                        
                        <div className="hidden md:flex items-center gap-8">
                            {navLinks.map((link, index) => (
                                <motion.a
                                    key={link.name}
                                    href={link.href}
                                    className="nav-link text-sm font-medium text-slate-300 hover:text-white transition-colors"
                                    initial={{ opacity: 0, y: -20 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ delay: index * 0.1 }}
                                >
                                    {link.name}
                                </motion.a>
                            ))}
                            <motion.a
                                href="#contact"
                                className="px-6 py-2 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full text-sm font-medium hover:shadow-lg hover:shadow-blue-500/25 transition-all btn-glow"
                                initial={{ opacity: 0, scale: 0.8 }}
                                animate={{ opacity: 1, scale: 1 }}
                                transition={{ delay: 0.6 }}
                            >
                                Hire Me
                            </motion.a>
                        </div>
                        
                        <button 
                            className="md:hidden text-white"
                            onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}
                        >
                            {isMobileMenuOpen ? <i data-lucide="x" /> : <i data-lucide="menu" />}
                        </button>
                    </div>
                    
                    {/* Mobile Menu */}
                    {isMobileMenuOpen && (
                        <motion.div 
                            className="md:hidden absolute top-full left-0 w-full glass-strong py-6"
                            initial={{ opacity: 0, y: -20 }}
                            animate={{ opacity: 1, y: 0 }}
                        >
                            {navLinks.map((link) => (
                                <a
                                    key={link.name}
                                    href={link.href}
                                    className="block px-6 py-3 text-slate-300 hover:text-white hover:bg-white/5 transition-colors"
                                    onClick={() => setIsMobileMenuOpen(false)}
                                >
                                    {link.name}
                                </a>
                            ))}
                        </motion.div>
                    )}
                </nav>
            );
        };

        // Hero Section
        const Hero = () => {
            const [text, setText] = useState('');
            const fullText = "Building intelligent systems with AI and scalable backend solutions";
            const [index, setIndex] = useState(0);
            
            useEffect(() => {
                if (index < fullText.length) {
                    const timeout = setTimeout(() => {
                        setText(prev => prev + fullText[index]);
                        setIndex(index + 1);
                    }, 50);
                    return () => clearTimeout(timeout);
                }
            }, [index]);
            
            return (
                <section id="home" className="min-h-screen flex items-center justify-center relative overflow-hidden pt-20">
                    <div className="absolute inset-0 bg-gradient-radial from-blue-900/20 via-transparent to-transparent" />
                    
                    <div className="container mx-auto px-6 relative z-10">
                        <div className="max-w-4xl mx-auto text-center">
                            <motion.div
                                initial={{ opacity: 0, y: 30 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.8 }}
                            >
                                <span className="inline-block px-4 py-2 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-sm font-medium mb-6">
                                    Available for opportunities
                                </span>
                            </motion.div>
                            
                            <motion.h1 
                                className="text-5xl md:text-7xl font-bold mb-6"
                                initial={{ opacity: 0, y: 30 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.8, delay: 0.2 }}
                            >
                                Hi, I'm <span className="text-gradient">Rohit Yadav</span>
                            </motion.h1>
                            
                            <motion.h2 
                                className="text-2xl md:text-3xl text-slate-400 mb-6 font-light"
                                initial={{ opacity: 0, y: 30 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.8, delay: 0.3 }}
                            >
                                AI/ML Engineer | Backend Developer
                            </motion.h2>
                            
                            <motion.p 
                                className="text-xl text-slate-400 mb-10 h-8 typing-cursor"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                transition={{ delay: 0.5 }}
                            >
                                {text}
                            </motion.p>
                            
                            <motion.div 
                                className="flex flex-col sm:flex-row gap-4 justify-center"
                                initial={{ opacity: 0, y: 30 }}
                                animate={{ opacity: 1, y: 0 }}
                                transition={{ duration: 0.8, delay: 0.7 }}
                            >
                                <a 
                                    href="#projects" 
                                    className="px-8 py-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-full font-semibold hover:shadow-lg hover:shadow-blue-500/25 transition-all btn-glow flex items-center justify-center gap-2"
                                >
                                    <span>View Projects</span>
                                    <i data-lucide="arrow-right" className="w-5 h-5" />
                                </a>
                                <a 
                                    href="#contact" 
                                    className="px-8 py-4 glass rounded-full font-semibold hover:bg-white/10 transition-all flex items-center justify-center gap-2"
                                >
                                    <span>Contact Me</span>
                                    <i data-lucide="mail" className="w-5 h-5" />
                                </a>
                            </motion.div>
                            
                            <motion.div 
                                className="mt-16 flex justify-center gap-6"
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                transition={{ delay: 1 }}
                            >
                                {[
                                    { icon: 'github', href: 'https://github.com/RO45Y', label: 'GitHub' },
                                    { icon: 'linkedin', href: 'https://www.linkedin.com/in/rohityadav-64b480272', label: 'LinkedIn' },
                                    { icon: 'mail', href: 'mailto:abhi.ya45187@gmail.com', label: 'Email' }
                                ].map((social) => (
                                    <a
                                        key={social.icon}
                                        href={social.href}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="w-12 h-12 rounded-full glass flex items-center justify-center hover:bg-blue-500/20 hover:scale-110 transition-all group"
                                        aria-label={social.label}
                                    >
                                        <i data-lucide={social.icon} className="w-5 h-5 text-slate-400 group-hover:text-blue-400 transition-colors" />
                                    </a>
                                ))}
                            </motion.div>
                        </div>
                    </div>
                    
                    {/* Scroll Indicator */}
                    <motion.div 
                        className="absolute bottom-10 left-1/2 transform -translate-x-1/2"
                        animate={{ y: [0, 10, 0] }}
                        transition={{ repeat: Infinity, duration: 2 }}
                    >
                        <div className="w-6 h-10 border-2 border-slate-600 rounded-full flex justify-center pt-2">
                            <div className="w-1.5 h-3 bg-blue-500 rounded-full" />
                        </div>
                    </motion.div>
                </section>
            );
        };

        // About Section - Fixed Image Path
        const About = () => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: "-100px" });
            const [imgError, setImgError] = useState(false);
            
            // Use relative path that works on GitHub Pages
            const imagePath = './rohit_pic.jpeg';
            
            return (
                <section id="about" className="py-32 relative" ref={ref}>
                    <div className="container mx-auto px-6">
                        <div className="grid md:grid-cols-2 gap-16 items-center">
                            <motion.div
                                initial={{ opacity: 0, x: -50 }}
                                animate={isInView ? { opacity: 1, x: 0 } : {}}
                                transition={{ duration: 0.8 }}
                            >
                                <div className="relative">
                                    <div className="absolute -inset-4 bg-gradient-to-r from-blue-600 to-purple-600 rounded-2xl opacity-30 blur-xl" />
                                    <div className="relative glass rounded-2xl p-2">
                                        <div className="aspect-[4/5] rounded-xl overflow-hidden bg-gradient-to-br from-slate-800 to-slate-900 profile-img-container relative">
                                            {!imgError ? (
                                                <img 
                                                    src={imagePath}
                                                    alt="Rohit Yadav"
                                                    className="w-full h-full object-cover object-top"
                                                    onError={(e) => {
                                                        console.error('Image failed to load:', imagePath);
                                                        setImgError(true);
                                                        e.target.style.display = 'none';
                                                    }}
                                                />
                                            ) : (
                                                <div className="w-full h-full flex flex-col items-center justify-center text-slate-500">
                                                    <i data-lucide="user" className="w-24 h-24 mb-4" />
                                                    <p className="text-sm text-center px-4">Rohit Yadav<br/><span className="text-xs">AI/ML Engineer</span></p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                    
                                    {/* Floating badges */}
                                    <motion.div 
                                        className="absolute -top-6 -right-6 glass px-4 py-2 rounded-full"
                                        animate={{ y: [0, -10, 0] }}
                                        transition={{ repeat: Infinity, duration: 3 }}
                                    >
                                        <span className="text-blue-400 font-semibold">8+ Months</span>
                                        <span className="text-slate-400 text-sm ml-2">Experience</span>
                                    </motion.div>
                                    
                                    <motion.div 
                                        className="absolute -bottom-6 -left-6 glass px-4 py-2 rounded-full"
                                        animate={{ y: [0, 10, 0] }}
                                        transition={{ repeat: Infinity, duration: 4, delay: 1 }}
                                    >
                                        <span className="text-purple-400 font-semibold">B.Sc CS</span>
                                        <span className="text-slate-400 text-sm ml-2">Graduate</span>
                                    </motion.div>
                                </div>
                            </motion.div>
                            
                            <motion.div
                                initial={{ opacity: 0, x: 50 }}
                                animate={isInView ? { opacity: 1, x: 0 } : {}}
                                transition={{ duration: 0.8, delay: 0.2 }}
                            >
                                <h2 className="text-4xl font-bold mb-6">
                                    About <span className="text-gradient">Me</span>
                                </h2>
                                <div className="space-y-4 text-slate-300 leading-relaxed">
                                    <p>
                                        I'm an experienced AI/ML Developer with over 8 months in the field, specializing in production-ready applications. My expertise spans backend frameworks like FastAPI and Django, alongside practical experience with LangChain and LangGraph for agentic AI.
                                    </p>
                                    <p>
                                        I have a proven ability to deploy complete AI systems, overseeing model development and API deployment using Docker and AWS. I'm passionate about building intelligent systems that solve real-world problems.
                                    </p>
                                    <p>
                                        My technical toolkit includes <span className="text-blue-400 font-medium">Python</span>, <span className="text-blue-400 font-medium">Django</span>, <span className="text-blue-400 font-medium">FastAPI</span>, <span className="text-purple-400 font-medium">TensorFlow</span>, <span className="text-purple-400 font-medium">PyTorch</span>, and <span className="text-purple-400 font-medium">OpenCV</span>. I'm dedicated to enhancing my skills in generative AI and multi-agent systems.
                                    </p>
                                </div>
                                
                                <div className="mt-8 flex flex-wrap gap-3">
                                    {['Problem Solver', 'Team Player', 'Fast Learner', 'Detail Oriented'].map((trait) => (
                                        <span key={trait} className="px-4 py-2 glass rounded-full text-sm text-slate-300">
                                            {trait}
                                        </span>
                                    ))}
                                </div>
                            </motion.div>
                        </div>
                    </div>
                </section>
            );
        };

        // Skills Section
        const Skills = () => {
            const ref = useRef(null);
            const isInView = useInView(ref, { once: true, margin: "-100px" });
            
            const skillCategories = [
                {
                    title: "Programming",
                    icon: "code-2",
                    skills: [
                        { name: "Python", level: 95 },
                        { name: "SQL", level: 85 },
                        { name: "Java", level: 75 },
                        { name: "JavaScript", level: 70 }
                    ]
                },
                {
                    title: "AI/ML",
                    icon: "brain",
                    skills: [
                        { name: "TensorFlow", level: 90 },
                        { name: "PyTorch", level: 85 },
                        { name: "Scikit-learn", level: 88 },
                        { name: "NLP / LLMs", level: 82 }
                    ]
                },
                {
                    title: "Backend",
                    icon: "server",
                    skills: [
                        { name: "FastAPI", level: 92 },
                        { name: "Django", level: 88 },
                        { name: "REST APIs", level: 90 },
                        { name: "PostgreSQL/SQLite", level: 85 }
                    ]
                },
                {
                    title: "DevOps & Tools",
                    icon: "wrench",
                    skills: [
                        { name: "Docker", level: 80 },
                        { name: "AWS (EC2, S3)", level: 75 },
                        { name: "Git/GitHub", level: 88 },
                        { name: "LangChain/LangGraph", level: 85 }
                    ]
                }
            ];
            
            return (
                <section id="skills" className="py-32 relative bg-slate-900/50" ref={ref}>
                    <div className="container mx-auto px-6">
                        <motion.div 
                            className="text-center mb-16"
                            initial={{ opacity: 0, y: 30 }}
                            animate={isInView ? { opacity: 1, y: 0 } : {}}
                        >
                            <h2 className="text-4xl font-bold mb-4">
                                Technical <span className="text-gradient">Skills</span>
                            </h2>
                            <p className="text-slate-400 max-w-2xl mx-auto">
                                Technologies and tools I use to bring ideas to life
                            </p>
                        </motion.div>
                        
                        <div className="grid md:grid-cols-2 gap-8">
                            {skillCategories.map((category, catIndex) => (
                                <motion.div
                                    key={category.title}
                                    className="glass rounded-2xl p-8 hoverable"
                                    initial={{ opacity: 0, y: 30 }}
                                    animate={isInView ? { opacity: 1, y: 0 } : {}}
                                    transition={{ delay: catIndex * 0.1 }}
                                    whileHover={{ scale: 1.02 }}
                                >
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-600 to-purple-600 flex items-center justify-center">
                                            <i data-lucide={category.icon} className="w-6 h-6 text-white" />
                                        </div>
                                        <h3 className="text-xl font-bold">{category.title}</h3>
                                    </div>
                                    
                                    <div className="space-y-4">
                                        {category.skills.map((skill, index) => (
                                            <div key={skill.name}>
                                                <div className="flex justify-between mb-1">
                                                    <span className="text-sm font-medium text-slate-300">{skill.name}</span>
                                                    <span className="text-sm text-slate-500">{skill.level}%</span>
                                                </div>
                                                <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                                                    <motion.div 
                                                        className="h-full bg-gradient-to-r from-blue-600 to-purple-600 rounded-full"
                                                        initial={{ width: 0 }}
                                                        animate={isInView ? { width: `${skill.level}%` } : {}}
                                                        transition={{ duration: 1, delay: 0.5 + (index * 0.1) }}
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                        
                        <motion.div 
                            className="mt-16 glass rounded-2xl p-8"
                            initial={{ opacity: 0 }}
                            animate={isInView ? { opacity: 1 } : {}}
