// Custom Cursor Component
const CustomCursor = () => {
    const [position, setPosition] = useState({ x: 0, y: 0 });
    const [isHovering, setIsHovering] = useState(false);
    
    useEffect(() => {
        const handleMouseMove = (e) => {
            setPosition({ x: e.clientX, y: e.clientY });
        };
        
        const handleMouseOver = (e) => {
            if (e.target.tagName === 'A' || e.target.tagName === 'BUTTON' || e.target.closest('.hoverable')) {
                setIsHovering(true);
            } else {
                setIsHovering(false);
            }
        };
        
        window.addEventListener('mousemove', handleMouseMove);
        window.addEventListener('mouseover', handleMouseOver);
        
        return () => {
            window.removeEventListener('mousemove', handleMouseMove);
            window.removeEventListener('mouseover', handleMouseOver);
        };
    }, []);
    
    return (
        <>
            <div 
                className="custom-cursor hidden md:block"
                style={{ 
                    left: position.x - 10, 
                    top: position.y - 10,
                    transform: isHovering ? 'scale(2)' : 'scale(1)',
                    opacity: isHovering ? 0.5 : 1,
                    width: '20px',
                    height: '20px',
                    border: '2px solid #3B82F6',
                    borderRadius: '50%',
                    position: 'fixed',
                    pointerEvents: 'none',
                    zIndex: 9999,
                    transition: 'transform 0.2s, opacity 0.2s',
                    mixBlendMode: 'difference'
                }}
            />
            <div 
                className="cursor-dot hidden md:block"
                style={{ 
                    left: position.x - 2, 
                    top: position.y - 2,
                    width: '4px',
                    height: '4px',
                    background: '#3B82F6',
                    borderRadius: '50%',
                    position: 'fixed',
                    pointerEvents: 'none',
                    zIndex: 9999
                }}
            />
        </>
    );
};

// Particle Background
const ParticleBackground = () => {
    const particles = Array.from({ length: 50 }, (_, i) => ({
        id: i,
        x: Math.random() * 100,
        y: Math.random() * 100,
        size: Math.random() * 4 + 1,
        duration: Math.random() * 20 + 10,
        delay: Math.random() * 5
    }));
    
    return (
        <div className="fixed inset-0 overflow-hidden pointer-events-none z-0">
            {particles.map((p) => (
                <div
                    key={p.id}
                    className="particle bg-blue-500/20"
                    style={{
                        left: `${p.x}%`,
                        top: `${p.y}%`,
                        width: p.size,
                        height: p.size,
                        animationDuration: `${p.duration}s`,
                        animationDelay: `${p.delay}s`
                    }}
                />
            ))}
        </div>
    );
};

// Scroll Progress
const ScrollProgress = () => {
    const [scroll, setScroll] = useState(0);
    
    useEffect(() => {
        const handleScroll = () => {
            const totalHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const progress = (window.scrollY / totalHeight) * 100;
            setScroll(progress);
        };
        
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
    }, []);
    
    return (
        <div className="fixed top-0 left-0 right-0 h-1 bg-gradient-to-r from-blue-600 to-purple-600 origin-left z-50"
             style={{ width: `${scroll}%` }}
        />
    );
};
